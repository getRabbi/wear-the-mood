# Codemagic CI/CD — Fashion OS Flutter app (CLAUDE.md §21).
# The app lives in app/; generated files (*.freezed.dart, *.g.dart,
# app_localizations*) are regenerated here, so every workflow runs codegen before
# analyze/test/build. Set secrets (keystore, Play key) as Codemagic env groups.

definitions:
  scripts:
    - &prepare
      name: Get deps + codegen
      script: |
        cd app
        flutter --version
        flutter pub get
        flutter gen-l10n
        dart run build_runner build --delete-conflicting-outputs
    - &verify
      name: Analyze + test
      script: |
        cd app
        flutter analyze
        flutter test

workflows:
  android:
    name: Android (build + test)
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - android_signing # keystore creds (set in Codemagic): CM_KEYSTORE etc.
    triggering:
      events: [push, pull_request]
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - *prepare
      - *verify
      - name: Build debug APK (testable artifact)
        script: |
          cd app
          flutter build apk --debug
    artifacts:
      - app/build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - uprightseo24@gmail.com

  android-release:
    name: Android release (signed AAB → Play)
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        # Upload your upload-keystore in Codemagic → Code signing identities,
        # name the reference `fashionos_upload`. Codemagic injects CM_KEYSTORE_PATH
        # / CM_KEYSTORE_PASSWORD / CM_KEY_ALIAS / CM_KEY_PASSWORD, which
        # android/app/build.gradle.kts reads for release signing (§22).
        - fashionos_upload
      groups:
        # Codemagic env group with the app's PUBLIC client config (§11 — no secrets):
        # API_BASE_URL=https://api.wearthemood.com, SUPABASE_URL, SUPABASE_ANON_KEY,
        # SENTRY_DSN, POSTHOG_API_KEY.
        - app_prod_config
    triggering:
      events: [tag]
      tag_patterns:
        - pattern: "v*" # e.g. push tag v1.0.0 to cut a release build
          include: true
    scripts:
      - *prepare
      - *verify
      - name: Write prod env (from the app_prod_config group)
        script: |
          cat > app/env/prod.json <<JSON
          {
            "ENVIRONMENT": "prod",
            "API_BASE_URL": "$API_BASE_URL",
            "SUPABASE_URL": "$SUPABASE_URL",
            "SUPABASE_ANON_KEY": "$SUPABASE_ANON_KEY",
            "SENTRY_DSN": "$SENTRY_DSN",
            "POSTHOG_API_KEY": "$POSTHOG_API_KEY"
          }
          JSON
      - name: Build signed app bundle
        script: |
          cd app
          flutter build appbundle --release --dart-define-from-file=env/prod.json
    artifacts:
      - app/build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - uprightseo24@gmail.com
      # Wire Play publishing later: add a Google Play service account in Codemagic
      # and a `google_play:` block here (track: internal) to auto-upload the AAB.

  ios-compile-check:
    name: iOS compile check (monthly, no Mac/signing needed)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    triggering:
      events: [push]
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - *prepare
      - *verify
      - name: Build iOS (no codesign) — surfaces platform issues early (§21)
        script: |
          cd app
          flutter build ios --release --no-codesign
    publishing:
      email:
        recipients:
          - uprightseo24@gmail.com
