# Build/test/scan → GHCR for the Heroku+Azure migration (blueprint §11.12).
# Runs on migration-branch push; builds the 3 images ONCE and pushes immutable
# commit-SHA tags (+ a floating migration-candidate tag) to GHCR. Production is
# NEVER deployed from the floating tag without resolving the digest (migration-deploy).
name: migration-build

on:
  push:
    branches: [migration/heroku-azure]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push to GHCR

concurrency:
  group: migration-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: backend tests + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      # NOTE: `ruff format --check` inherits pre-existing main-branch format drift
      # (unrelated to this migration). Resolve with a one-time `ruff format .` before
      # relying on this gate going green.
      - run: ruff format --check .
      - run: pytest -q

  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  images:
    name: build + push ${{ matrix.name }}
    needs: [test, secret-scan]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: wtm-api
            dockerfile: backend/api.Dockerfile
          - name: wtm-rembg-worker
            dockerfile: backend/rembg-worker.Dockerfile
          - name: wtm-orchestrator
            dockerfile: backend/orchestrator.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GHCR auth; write:packages permission above
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: backend
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/getrabbi/${{ matrix.name }}:${{ github.sha }}
            ghcr.io/getrabbi/${{ matrix.name }}:migration-candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: record immutable digest
        run: echo "${{ matrix.name }} digest = ${{ steps.build.outputs.digest }}"
