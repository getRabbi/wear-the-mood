# ⚠️ NOT THE ACTIVE DEPLOYMENT. Production runs on a DigitalOcean droplet via
# docker-compose (see DEPLOY_DIGITALOCEAN.md): ssh -> git pull -> docker compose
# up -d --build. This Render blueprint is kept ONLY as a fallback host; a `git
# push` does NOT deploy anything here. Don't assume Render is live.
#
# Render Blueprint — https://render.com/docs/blueprint-spec
# Fashion OS backend (CLAUDE.md §2, §7, §20):
#   api    (web)  — FastAPI, free plan
#   worker        — async try-on + background-removal jobs
#   daily  (cron) — timezone-aware morning stylist push (runs hourly; each user
#                   is sent at their local DAILY_PUSH_HOUR)
#   news   (cron) — RSS ingestion + summarization, a few times a day
#
# Secrets are NOT stored here — set them in the dashboard for the env group and
# the per-service `sync: false` keys.
#
# COST NOTE: worker + crons are paid (always-on / per-run); api is free. Bring
# them up as budget allows — the app degrades gracefully without the worker
# (no cutouts/embeddings) and without the crons (no push/news).

envVarGroups:
  - name: fashionos-shared
    envVars:
      # Supabase + DB
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CONNECTION_STRING
        sync: false
      # AI / try-on providers
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FASHN_API_KEY
        sync: false
      # Subscriptions (§18) — RevenueCat REST key + webhook shared secret
      - key: REVENUECAT_API_KEY
        sync: false
      - key: REVENUECAT_WEBHOOK_AUTH
        sync: false
      # Shop-the-look affiliate (§18, §24) — unset => neutral web search
      - key: AFFILIATE_SEARCH_URL
        sync: false
      - key: AFFILIATE_TAG_PARAM
        sync: false
      - key: AFFILIATE_TAG
        sync: false
      # Observability
      - key: SENTRY_DSN
        sync: false

services:
  - type: web
    name: fashionos-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: PYTHON_VERSION
        value: "3.12.10"
      # FASHN try-on is verified live (§2.2); the key comes from the group.
      - key: TRYON_PROVIDER
        value: fashn
      - fromGroup: fashionos-shared

  - type: worker
    name: fashionos-worker
    runtime: python
    rootDir: backend
    plan: starter
    # Worker pulls the heavy rembg stack (background removal, §2.2).
    buildCommand: pip install -r requirements-worker.txt
    startCommand: python -m app.workers.worker
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: BG_PROVIDER
        value: rembg
      - fromGroup: fashionos-shared

  - type: cron
    name: fashionos-daily
    runtime: python
    rootDir: backend
    plan: starter
    # Hourly: the job sends only to users whose LOCAL hour == DAILY_PUSH_HOUR (§20).
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.cron.daily
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DAILY_PUSH_HOUR
        value: "8"
      # stub until Firebase is set up; then 'fcm' + the FCM_* keys below.
      - key: PUSH_PROVIDER
        sync: false
      - key: FCM_PROJECT_ID
        sync: false
      - key: FCM_CREDENTIALS_JSON
        sync: false
      - fromGroup: fashionos-shared

  - type: cron
    name: fashionos-news
    runtime: python
    rootDir: backend
    plan: starter
    schedule: "0 */6 * * *" # every 6 hours
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.cron.news
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: PYTHON_VERSION
        value: "3.12.10"
      # 'rss' + a feed list activates real news (else stub). See .env.example.
      - key: NEWS_PROVIDER
        sync: false
      - key: NEWS_RSS_FEEDS
        sync: false
      - fromGroup: fashionos-shared

  - type: cron
    name: fashionos-community
    runtime: python
    rootDir: backend
    plan: starter
    schedule: "0 6 1 * *" # 06:00 UTC on the 1st — award last month's leaderboard #1
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.cron.community
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: PYTHON_VERSION
        value: "3.12.10"
      # Push to the winner uses the same FCM config as the daily cron (stub until set).
      - key: PUSH_PROVIDER
        sync: false
      - key: FCM_PROJECT_ID
        sync: false
      - key: FCM_CREDENTIALS_JSON
        sync: false
      - fromGroup: fashionos-shared
